name: build

on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main

jobs:
    build:
        name: ${{ matrix.os }} ${{matrix.compiler}} (${{ matrix.build_type }})
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                build_type: [Release, Debug]
                compiler: [gcc, clang]
                include:
                - compiler: gcc
                  cc: gcc
                  cxx: g++

                - compiler: clang
                  cc: clang
                  cxx: clang++

                - os: macos-latest
                  compiler: gcc
                  cc: gcc-14
                  cxx: g++-14

                - os: windows-latest
                  generator: -G "MinGW Makefiles"

                - os: windows-latest
                  build_type: Release
                  compiler: msvc
                  cc: cl
                  cxx: cl
                  generator: -G "Visual Studio 17 2022"

                - os: windows-latest
                  build_type: Debug
                  compiler: msvc
                  cc: cl
                  cxx: cl
                  generator: -G "Visual Studio 17 2022"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Cmake
              run: >
                cmake -B ${{github.workspace}}/build
                -DCMAKE_BUILD_TYPE=${{matrix.build_type}}
                -DCMAKE_C_COMPILER=${{matrix.cc}}
                -DCMAKE_CXX_COMPILER=${{matrix.cxx}}
                ${{matrix.generator}}

            - name: Build
              run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}}

